name: Bug report
description: Report a reproducible package defect
title: "[Bug]: "
labels: [bug]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - com.lingkyn.project-initializer
        - com.lingkyn.xr-baseline
        - com.lingkyn.inventory.core
        - com.lingkyn.inventory.unity
        - com.lingkyn.inventory.presentation
        - com.lingkyn.inventory.ugui
        - com.lingkyn.inventory.uitoolkit
        - com.lingkyn.inventory.xr.ugui
        - com.lingkyn.inventory.xr.uitoolkit
        - com.lingkyn.persistence.core
        - Repository tooling
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: input
    id: unity
    attributes:
      label: Unity version and platform
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include setup, exact actions, expected result, actual result, and logs.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private project data, and machine-local paths.
          required: true
