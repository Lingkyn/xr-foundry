name: Feature request
description: Propose a bounded improvement to an existing package
title: "[Feature]: "
labels: [enhancement]
body:
  - type: input
    id: problem
    attributes:
      label: Problem
      description: Describe the reusable consumer problem, not one game's implementation.
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Proposed package boundary and alternatives
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Tests, samples, compatibility, and migration evidence
    validations:
      required: true
