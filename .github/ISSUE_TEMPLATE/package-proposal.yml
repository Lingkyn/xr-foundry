name: Reusable system proposal
description: Propose an incubating package or reference entry
title: "[System Proposal]: "
labels: [package-proposal]
body:
  - type: textarea
    id: common_problem
    attributes:
      label: Common problem and consumers
      description: Name at least two materially different cross-project consumer contexts; multiple scenes in one game do not count.
    validations:
      required: true
  - type: textarea
    id: common_kernel
    attributes:
      label: Source-supported common kernel
      description: Identify only capabilities shared by independent positive sources; explain why this is an industry system rather than one product feature.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Official, professional, and adopted source comparison
      description: Include current maintenance, adoption/authority, license, and rejected alternatives.
    validations:
      required: true
  - type: textarea
    id: architecture
    attributes:
      label: API, data, prefab/component, UI, save/load, and extension boundaries
    validations:
      required: true
  - type: textarea
    id: project_exclusions
    attributes:
      label: Configurable variation and project-specific exclusions
      description: State what becomes configuration, policy, port, adapter, sample, or extension, and what must remain in consumer repositories.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Tests, samples, independent consumer compile, migration, and device evidence plan
    validations:
      required: true
  - type: checkboxes
    id: maturity
    attributes:
      label: Maturity acknowledgement
      options:
        - label: This proposal begins as incubating and is not a stable package or compatibility claim.
          required: true
