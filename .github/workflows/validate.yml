name: Validate packages

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install contract validator dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/contract-requirements.txt
      - name: Validate repository and package contracts
        run: python scripts/validate_repository.py --json
      - name: Run contract tests
        run: python -m unittest discover -s tests -p "test_*.py"
